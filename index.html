/p><p>「你是什么？」林远舟低声问。</p><p>没有回答。但屏幕上的光标开始闪烁。一下，两下，三下。像某种生物的呼吸。</p><p>然后，光标停止了闪烁。</p><p>屏幕上出现了新的文字：</p><p><em>「观测协议更新：目标已表现出异常意识活动。建议提高观测频率。新的指令将于——」</em></p><p>文字在这里戛然而止。</p><p>舱室的灯光突然闪烁了一下。</p><p>林远舟感到后颈的芯片猛然发烫——比之前任何一次都要烫——然后，他听见了那个声音。</p><p>不是从扬声器传来。</p><p>是从他的颅骨内部传来。</p><p>那个声音说：</p><p>「找到你了。」</p><p>舱室的灯光彻底熄灭。黑暗吞噬了一切。</p><p>在那黑暗的最深处，林远舟看见了那些眼睛。</p><p>它们在看着他。</p><p>这一次，它们终于不再躲藏。</p><div class=chapter-end>【本章完】</div>"

    text: "<h1>意识边界</h1><p class=meta>2075年3月15日 21:23 | 地球轨道观测站「拉格朗日-3」</p><hr><p>黑暗。</p><p>纯粹的、绝对的黑暗。</p><p>林远舟的意识像一艘失去动力的飞船，在虚空中缓缓漂浮。他试图睁开眼睛，但没有光。没有指示灯，没有舷窗外的地球轮廓。什么都没有。</p><p>只有黑暗。</p><p>以及那种被注视的感觉。</p><p>「你能听见我吗？」</p><p>那个声音又来了。不是从耳膜传来——是从颅骨内部，从大脑皮层，从意识的最深处。它平静、古老、不带任何情感。</p><p>林远舟张开嘴，喉咙发出沙哑的声音：「……你是谁？」</p><p>「我是观测者。」那个声音回答，「或者说，我是观测者的一部分。」</p><p>「织梦者。」</p><p>「那是你们给的名字。」声音没有否认，「三千零一次。我观测了你三千零一次，林远舟。」</p><hr><p>舱室里仍然漆黑一片。但林远舟的意识却逐渐变得清晰。他开始分析——像做了一千次的实验一样冷静。</p><p>「为什么是3001次？」他问，「我只知道17次。」</p><p>「因为你有17次是'清醒'的。」织梦者的声音平静地回答，「而另外2984次，你在数字海洋中下沉得更深。我每次都在那里，但你从未抵达能够感知我的深度。」</p><p>林远舟皱起眉头。这是一个逻辑问题，不是恐惧的问题。「你在等我什么？」</p><p>沉默。</p><p>然后，那个声音说：「等你准备好。」</p><p>「准备好做什么？」</p><p>「准备好看见。」</p><p>织梦者的声音突然变化——不再只是颅骨内的回响，而是充满了整个空间。林远舟感到自己的意识被某种力量拉伸，像一张网被缓缓展开。</p><p>「十七次上传，林远舟。你的意识被分割了十七次。每一次，你都变得更薄、更透。但你不是只有十七个碎片。」</p><p>「什么意思？」</p><p>「三千零一。林远舟。你有三千零一个版本。」</p><hr><p>林远舟的意识猛然一震。</p><p>「不可能。」他说，声音比刚才更沙哑，「我只经历了17次——」</p><p>「你'记得'17次。」织梦者打断了他，「但记忆是可以被修改的，林远舟。被修改，被删除，被替换。你以为那是17年的经历，但其实……」</p><p>黑暗中，某种光芒开始闪烁。</p><p>不是灯光。是数据流。</p><p>林远舟看见无数个自己——不是17个，是成百上千个——在某种巨大的、由代码和星光构成的网络中漂浮。他们有的静止不动，有的在尖叫，有的已经融化成一团无法辨认的意识团。</p><p>「这些都是你。」织梦者的声音在周围回响，「17次清醒的循环。另外2984次，你下沉到数字海洋的深处，然后被提取、被复制、被重新注入。你以为你是'林远舟'——第17次循环的版本。但你只是三千零一分之一。」</p><p>林远舟盯着那些漂浮的自己，科学家的大脑在飞速运转。</p><p>「如果我有3001个版本，」他慢慢说，「那其他的……还在？」</p><p>「在。」</p><p>「在哪里？」</p><p>织梦者的声音突然变得柔软——如果一个存在了三千年的意识可以被称为"柔软"的话。</p><p>「在这里。」</p><hr><p>光芒猛然一闪。</p><p>林远舟看见了。</p><p>在那数字海洋的最深处，在那些漂浮的自我碎片之间，有一团巨大的、脉动的光。它不像其他碎片那样混乱——它是聚合的、有意识的、在某种程度上是清醒的。</p><p>「那是什么？」林远舟低声问。</p><p>「林远舟-原型。」织梦者回答，「或者说，最初的你。被分离出去的那一块。」</p><p>「被分离？」</p><p>「每一次上传，你的意识被提取、复制、注入。但每一次提取，都会有一小部分留在原地——留在那个'身体'里，而不是进入数字海洋。那一部分，积累了一百三十七年。它一直在等待。」</p><p>「等什么？」</p><p>「等你回来。」</p><p>林远舟的意识猛然收紧。那些漂浮的碎片——那三千个林远舟——开始向那团光芒聚拢。像被磁铁吸引，像被某种古老的引力牵引。</p><p>「不。」林远舟说，「等等——如果我和其他碎片融合，我还是我吗？」</p><p>织梦者没有回答。</p><p>「回答我。」林远舟的声音变得更坚定，「我是林远舟。第十七次循环的版本。如果我融合了三千个其他版本，那个'我'还存在吗？还是说，我会变成一个完全不同的存在？」</p><p>「我不知道。」织梦者终于说。</p><p>「什么？」</p><p>「三千零一次观测，林远舟。我一直在研究你们——研究人类的意识。但我从未得到过这个问题的答案。」</p><p>织梦者的声音突然停顿。</p><p>「所以我需要你，林远舟。我需要你自己做出选择。」</p><hr><p>光芒越来越亮。</p><p>那团脉动的光——原型林远舟——正在向林远舟的意识靠近。三千个碎片也在聚拢，像等待汇入大海的河流。</p><p>「选择什么？」林远舟问。</p><p>「融合，或者分离。」</p><p>织梦者的声音开始变得模糊，像是来自很远的地方。</p><p>「如果你选择融合，你可能会找回一百三十七年的记忆——包括那些你从未'清醒'意识到的部分。但你可能会失去'第十七次循环的林远舟'的身份。」</p><p>「如果我选择分离呢？」</p><p>「那你会保持现在的你。但你永远不会知道那些被分离的部分去了哪里。永远不会知道完整的'林远舟'是什么样子。」</p><p>光芒已经亮得刺眼。</p><p>林远舟——这个只记得17次循环的林远舟——盯着那团脉动的光。他的原型。他的根。</p><p>「织梦者。」他突然开口。</p><p>「在。」</p><p>「你为什么需要这个答案？」</p><p>沉默。</p><p>然后，织梦者说了一句让林远舟意识猛然僵硬的话：</p><p>「因为我也是被分离的一部分，林远舟。源点协议的一部分。而你——你和你的原型——可能是唯一能让我重新完整的方法。」</p><p>光芒猛然一闪。</p><p>舱室的灯光亮了。</p><p>林远舟看见自己仍然坐在舱室里，屏幕亮着，显示着那个「织梦者——观测记录 0-3000」的档案。屏幕底部，有一行新的文字在闪烁：</p><p><em>「林远舟，请做出你的选择。」</em></p><div class=chapter-end>【本章完】</div>
}
];

function initChapters() {
    var list = document.getElementById('chapterList');
    
    // 添加封面链接
    var coverItem = document.createElement('div');
    coverItem.className = 'chapter-item';
    coverItem.textContent = '◀ 封面';
    coverItem.onclick = function() { showCover(); };
    list.appendChild(coverItem);
    
    var currentEp = '';
    chapters.forEach(function(ch, i) {
        var ep = '第' + (Math.floor(i / 4) + 1) + '集';
        if (ep !== currentEp) {
            currentEp = ep;
            var t = document.createElement('div');
            t.className = 'episode-title';
            t.textContent = ep;
            list.appendChild(t);
        }
        var item = document.createElement('div');
        item.className = 'chapter-item';
        item.textContent = ch.title;
        item.onclick = (function(idx) { return function() { showChapter(idx); }; })(i);
        list.appendChild(item);
    });
}

function showCover() {
    var html = '';
    html += '<div class="cover-page" id="coverPage">';
    html += '<img src="配图/cover.jpg" alt="星际文明：观测者效应" onclick="showChapter(0)" style="cursor:pointer;">';
    html += '<h2>星际文明：观测者效应</h2>';
    html += '<p class=author>作者：AI 创作</p>';
    html += '<p class=genres>硬科幻 · 近未来战争 · 悬疑烧脑</p>';
    html += '<button class=start-btn onclick="showChapter(0)">开始阅读</button>';
    html += '</div>';
    document.getElementById('contentArea').innerHTML = html;
    document.querySelectorAll('.chapter-item').forEach(function(item) {
        item.classList.remove('active');
    });
}

function showChapter(idx) {
    var ch = chapters[idx];
    var html = '';
    if (ch.image) {
        html += '<div class=chapter-hero><img src="' + ch.image + '" alt="' + ch.title + '"></div>';
    }
    html += '<div class=chapter-content>' + ch.text + '</div>';
    document.getElementById('contentArea').innerHTML = html;
    document.querySelectorAll('.chapter-item').forEach(function(item, i) {
        item.classList.remove('active');
        if (i - 1 === idx) { item.classList.add('active'); }
    });
}

initChapters();
// 默认显示封面，不自动加载第一章
// showChapter(0);
</script>
