</div>

<script>
var chapters = [
{
    title: "EP01-01：量子隧穿",
    image: "配图/ep01-01.jpg",
    text: "<h1>量子隧穿</h1><p class=meta>2075年3月15日 03:47 | 地球轨道观测站「拉格朗日-3」</p><hr><p>身体在坠落。</p><p>不是比喻。是真正的、物理意义上的坠落——他的躯干分裂成无数碎片，每一片都载着一个尖叫的意识版本，向无尽的黑暗深渊四散而去。</p><p>林远舟想要抓住什么。他的手指穿过虚空，穿过那些正在融化的自己，什么也抓不到。</p><p>然后他看见了那些眼睛。</p><p>不是一双。是无数双。它们像星星一样悬浮在黑暗中，同时注视着他——那种目光冰冷、古老、不带任何情感。无数细丝般的光芒从那些眼睛延伸出来，连接着林远舟的每一块碎片。</p><p>他在被观测。</p><p>那些细丝开始收缩，像渔网拉起猎物。林远舟感到自己的意识被越拉越细，细到几乎不存在——</p><hr><p>他猛然睁开眼。</p><p>心跳声在耳膜里炸开。汗湿透了太空内衣的纤维，贴在皮肤上，冰凉黏腻。他下意识地摸向后颈——那块芯片正在发烫，不是普通的温热，是像烙铁一样的灼烧感，仿佛有什么东西正在通过它向外传输数据。</p><p>「系统。」他的声音沙哑得不像自己，「时间。」</p><p>「2075年3月15日，03:47:22。」女性化的合成音从扬声器传来，「距离上次意识上传已过去17小时34分钟。您的心率达到每分钟142次，建议立即进行生理监测——」</p><p>「不必。」</p><p>林远舟坐起身，揉了揉太阳穴。十七小时。每一次上传后的感受都是这漫长的坠落。但今天不一样。</p><p>今天，他在坠落中看见了那些眼睛。</p><p>以前只是无尽的碎片和尖叫。是从什么时候开始的？第三次？第五次？他已经记不清了。但从来没有眼睛。从来没有被注视的感觉。</p><p>直到今晚。</p><p>舷窗外，地球悬浮在虚空中。蓝色的海洋、白色的云层、褐色的大陆——像一颗被薄云包裹的弹珠。他盯着那颗星球看了很久，才确认自己仍然「在这里」。</p><p>仍然是林远舟。</p><p>仍然拥有这具血肉之躯。</p><p>但那些眼睛是谁的？</p><hr><p>「林博士。」</p><p>舱门滑开的声音打断了他的思绪。一个穿着联邦制服的年轻人站在门口，手里拿着一个数据板，表情有些紧张。</p><p>「总部有紧急通讯。」</p><p>林远舟没有回头。他仍然盯着舷窗外的地球，声音平静：「什么事？」</p><p>「'源点协议'碎片。」年轻人的声音微微颤抖，「在火星轨道废弃矿坑里被发现了。」</p><p>林远舟的瞳孔骤然收缩。</p><p>源点协议。</p><p>那是人类在2147年首次发现的宇宙遗迹，被认为是宇宙大爆炸时期的产物。一百二十七年来，它一直沉睡在地球联邦的最高保密区。全息投影显示它是一个由未知合金铸成的八面体结构，直径约三米，表面刻满了从未被破译的符文。</p><p>而现在，它的一块碎片被找到了。</p><p>奇怪的是，林远舟感到的不是兴奋。那种感觉很熟悉——就像在坠落的深渊中，被无数双眼睛注视时的感觉。一种莫名的、冰冷的恐惧。</p><p>「总部的意思是？」</p><p>「他们希望您亲自带队前往。」年轻人深吸一口气，「林博士，这是人类第一次如此接近'源点协议'的真相。联邦首席科学顾问说——」</p><p>「说什么？」</p><p>「说您是唯一一个有'意识上传经验'的科学家。如果您能带上您的上传记录，或许能解读那些符文。」</p><p>林远舟沉默了。</p><p>他想起了那十七个小时的坠落。想起了那些眼睛——那些在黑暗中注视着他、记录着他每一次意识分裂的眼睛。</p><p>「告诉总部。」他终于开口，「我去。」</p><hr><p><em>当晚 21:15 | 林远舟私人舱室</em></p><p>出发前的准备已经完成。他给妻子发送了一条加密信息，只有三个字：「等我回。」</p><p>然后他打开了那份被封存在量子网络最深处的档案。</p><p>他自己都不知道它为什么会在那里。只是一串异常的加密数据，藏在联邦最高保密层的边缘，像是被故意留下的。</p><p>档案的标签写着：「织梦者——观测记录 0-3000」</p><p>林远舟点击了打开。</p><p>屏幕上浮现出一行文字：</p><p><em>「第3001次观测日志：目标已进入意识上传实验的第17次循环。数据异常。疑似觉醒迹象。是否上报母体？等待指令。」</em></p><p>林远舟的后背渗出一层冷汗。</p><p>第3001次。</p><p>不是第17次。是三千零一次。</p><p>他盯着屏幕上的「织梦者」三个字，忽然明白了什么。那些噩梦中的眼睛——那个在坠落时注视着他的存在——它们一直在看着。从第一次上传开始，从未停止。</p><p>而他以为只有17次。</p><p>「你是什么？」林远舟低声问。</p><p>没有回答。但屏幕上的光标开始闪烁。一下，两下，三下。像某种生物的呼吸。</p><p>然后，光标停止了闪烁。</p><p>屏幕上出现了新的文字：</p><p><em>「观测协议更新：目标已表现出异常意识活动。建议提高观测频率。新的指令将于——」</em></p><p>文字在这里戛然而止。</p><p>舱室的灯光突然闪烁了一下。</p><p>林远舟感到后颈的芯片猛然发烫——比之前任何一次都要烫——然后，他听见了那个声音。</p><p>不是从扬声器传来。</p><p>是从他的颅骨内部传来。</p><p>那个声音说：</p><p>「找到你了。」</p><p>舱室的灯光彻底熄灭。黑暗吞噬了一切。</p><p>在那黑暗的最深处，林远舟看见了那些眼睛。</p><p>它们在看着他。</p><p>这一次，它们终于不再躲藏。</p><div class=chapter-end>【本章完】</div>"
},
{
    title: "EP01-02：意识边界",
    image: "",
    text: "<h1>意识边界</h1><p class=meta>（本章内容待续...）</p><hr><p>（本章内容待续...）</p><div class=chapter-end>【本章完】</div>"
}
];

function initChapters() {
    var list = document.getElementById('chapterList');
    
    // 添加封面链接
    var coverItem = document.createElement('div');
    coverItem.className = 'chapter-item';
    coverItem.textContent = '◀ 封面';
    coverItem.onclick = function() { showCover(); };
    list.appendChild(coverItem);
    
    var currentEp = '';
    chapters.forEach(function(ch, i) {
        var ep = '第' + (Math.floor(i / 4) + 1) + '集';
        if (ep !== currentEp) {
            currentEp = ep;
            var t = document.createElement('div');
            t.className = 'episode-title';
            t.textContent = ep;
            list.appendChild(t);
        }
        var item = document.createElement('div');
        item.className = 'chapter-item';
        item.textContent = ch.title;
        item.onclick = (function(idx) { return function() { showChapter(idx); }; })(i);
        list.appendChild(item);
    });
}

function showCover() {
    var html = '';
    html += '<div class="cover-page" id="coverPage">';
    html += '<img src="配图/cover.jpg" alt="星际文明：观测者效应" onclick="showChapter(0)" style="cursor:pointer;">';
    html += '<h2>星际文明：观测者效应</h2>';
    html += '<p class=author>作者：AI 创作</p>';
    html += '<p class=genres>硬科幻 · 近未来战争 · 悬疑烧脑</p>';
    html += '<button class=start-btn onclick="showChapter(0)">开始阅读</button>';
    html += '</div>';
    document.getElementById('contentArea').innerHTML = html;
    document.querySelectorAll('.chapter-item').forEach(function(item) {
        item.classList.remove('active');
    });
}

function showChapter(idx) {
    var ch = chapters[idx];
    var html = '';
    if (ch.image) {
        html += '<div class=chapter-hero><img src="' + ch.image + '" alt="' + ch.title + '"></div>';
    }
    html += '<div class=chapter-content>' + ch.text + '</div>';
    document.getElementById('contentArea').innerHTML = html;
    document.querySelectorAll('.chapter-item').forEach(function(item, i) {
        item.classList.remove('active');
        if (i - 1 === idx) { item.classList.add('active'); }
    });
}

initChapters();
// 默认显示封面，不自动加载第一章
// showChapter(0);
</script>

</body>
</html>
